- name: Deploy Maven Artifact
  hosts: web
  tasks:
    - name: Copy JAR file
      copy:
        src: /var/lib/jenkins/workspace/program8/target/myapp-1.0-SNAPSHOT.jar
        dest: /opt/myapp-1.0-SNAPSHOT.jar


    - name: Run application
      shell: nohup java -jar /opt/maven-example-1.0-SNAPSHOT.jar &
